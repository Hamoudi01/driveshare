{% extends "base.html" %}
{% block title %}List Your Car — DriveShare{% endblock %}
{% block content %}
<div style="max-width:600px; margin:3rem auto; padding:0 1.5rem;">
  <h1 class="page-title">List Your Car</h1>
  <p class="page-subtitle">Built using the <strong style="color:var(--rust);">Builder Pattern</strong> — each attribute is set step-by-step.</p>

  <div class="card">
    <div class="card-body" style="padding:2rem;">
      <form method="POST" action="/cars/new">

        <div class="section-label" style="font-size:1rem; margin-bottom:1rem; color:var(--rust);">Step 1 — Basic Info</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
          <div class="form-group"><label>Make</label><input type="text" name="make" required placeholder="Toyota"></div>
          <div class="form-group"><label>Model</label><input type="text" name="model" required placeholder="Camry"></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
          <div class="form-group"><label>Year</label><input type="number" name="year" required min="1990" max="2026" placeholder="2022"></div>
          <div class="form-group"><label>Mileage</label><input type="number" name="mileage" placeholder="25000" min="0"></div>
        </div>

        <hr>
        <div class="section-label" style="font-size:1rem; margin-bottom:1rem; color:var(--rust);">Step 2 — Location & Price</div>
        <div class="form-group"><label>Pick-up Location</label><input type="text" name="location" required placeholder="Detroit, MI"></div>
        <div class="form-group"><label>Price Per Day ($)</label><input type="number" name="price_per_day" required min="1" step="0.01" placeholder="65.00"></div>

        <hr>
        <div class="section-label" style="font-size:1rem; margin-bottom:1rem; color:var(--rust);">Step 3 — Details (Optional)</div>
        <div class="form-group"><label>Description</label><textarea name="description" placeholder="Describe your car — condition, features, any rules..."></textarea></div>
        <div class="form-group"><label>Image URL</label><input type="text" name="image_url" placeholder="https://..."></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
          <div class="form-group"><label>Available From</label><input type="date" name="avail_start"></div>
          <div class="form-group"><label>Available Until</label><input type="date" name="avail_end"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">Build & Publish Listing</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
