{% extends "base.html" %}
{% block title %}Recover Password — DriveShare{% endblock %}
{% block content %}
<div style="max-width:420px; margin:5rem auto; padding:0 1.5rem;">
  <h1 class="page-title">Recover Password</h1>
  <p class="page-subtitle">Enter your email to begin the security verification chain.</p>
  <div class="card">
    <div class="card-body" style="padding:2rem;">
      <form method="POST" action="/recover">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" required autofocus placeholder="you@example.com">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Continue →</button>
      </form>
      <p style="text-align:center; font-size:0.85rem; color:var(--gray); margin-top:1rem;">
        <a href="/login" style="color:var(--rust);">Back to Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
