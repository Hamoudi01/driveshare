{% extends "base.html" %}
{% block title %}Reset Password — DriveShare{% endblock %}
{% block content %}
<div style="max-width:420px; margin:5rem auto; padding:0 1.5rem;">
  <h1 class="page-title">New Password</h1>
  <p class="page-subtitle" style="color:#a5d6a7;">✓ Identity verified. Set your new password below.</p>
  <div class="card">
    <div class="card-body" style="padding:2rem;">
      <form method="POST" action="/recover/reset">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" name="new_password" required placeholder="Min. 8 characters">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
