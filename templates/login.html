{% extends "base.html" %}
{% block title %}Log In — DriveShare{% endblock %}
{% block content %}
<div style="max-width:420px; margin:5rem auto; padding:0 1.5rem;">
  <h1 class="page-title">Welcome Back</h1>
  <p class="page-subtitle">Log in to your DriveShare account.</p>

  <div class="card">
    <div class="card-body" style="padding:2rem;">
      <form method="POST" action="/login">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" required autofocus placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="Your password">
        </div>
        <div style="text-align:right; margin-bottom:1.2rem;">
          <a href="/recover" style="font-size:0.82rem; color:var(--rust);">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Log In</button>
      </form>
      <p style="text-align:center; font-size:0.85rem; color:var(--gray); margin-top:1rem;">
        No account? <a href="/register" style="color:var(--rust);">Sign up free</a>
      </p>

      <!-- Demo credentials hint -->
      <div style="margin-top:1.5rem; padding:0.8rem; background:rgba(201,75,42,0.08); border-radius:8px; border:1px solid rgba(201,75,42,0.25);">
        <p style="font-size:0.75rem; color:var(--gray); margin-bottom:0.4rem; font-weight:600; letter-spacing:0.05em; text-transform:uppercase;">Demo Accounts</p>
        <p style="font-size:0.8rem; color:var(--gray-lt);">alice@demo.com / bob@demo.com / carol@demo.com<br>Password: <code style="color:var(--rust);">password123</code></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
